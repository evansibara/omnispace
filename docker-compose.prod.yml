services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnispace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-omnispace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-omnispace}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - omnispace_internal

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnispace_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - omnispace_internal

  # ─── Backend (NestJS) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/backend/Dockerfile
      target: production
    image: omnispace/backend:latest
    container_name: omnispace_backend
    restart: unless-stopped
    environment:
      NODE_ENV:       production
      PORT:           3000
      API_PREFIX:     ${API_PREFIX:-api/v1}
      FRONTEND_URL:   ${FRONTEND_URL}
      POSTGRES_HOST:  omnispace_postgres
      POSTGRES_PORT:  5432
      POSTGRES_USER:  ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:    ${POSTGRES_DB:-omnispace}
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@omnispace_postgres:5432/${POSTGRES_DB:-omnispace}?schema=public
      JWT_SECRET:     ${JWT_SECRET}
      REDIS_HOST:     omnispace_redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - omnispace_internal

  # ─── Nginx (Reverse Proxy + Serving Frontend) ──────────────────────────────
  nginx:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: omnispace_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - omnispace_internal
      - omnispace_external

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  omnispace_internal:
    driver: bridge
  omnispace_external:
    driver: bridge