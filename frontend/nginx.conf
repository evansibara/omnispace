# =============================================================================
# Frontend Nginx Config (used inside the frontend container)
# Simple SPA server — actual reverse proxy lives in the nginx service.
# =============================================================================

server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served via index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
