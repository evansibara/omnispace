# =============================================================================
# Nginx Main Configuration — OmniSpace
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types text/plain text/css application/javascript application/json application/xml;

    # Upstream untuk backend
    # Pastikan nama service di docker-compose Anda adalah 'backend'
    upstream backend_upstream {
        server backend:3000;
        keepalive 32;
    }

    # =========================================================================
    # VIRTUAL HOST (BLOK SERVER) - Bagian ini yang membuat web Anda muncul
    # =========================================================================
    server {
        listen 80;
        server_name localhost;

        # 1. Lokasi Frontend (SPA)
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Penting untuk SPA (React/Vue/Angular) agar refresh tidak 404
            try_files $uri $uri/ /index.html;
        }

        # 2. Lokasi Backend (API)
        location /api/v1 {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}