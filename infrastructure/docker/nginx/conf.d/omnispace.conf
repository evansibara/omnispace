# =============================================================================
# OmniSpace — Nginx Virtual Host (Reverse Proxy + SPA)
# Handles both the API proxy (/api/*) and the React SPA (/*).
# =============================================================================

server {
    listen 80;
    server_name _;      # Accept any hostname; override with your domain in prod

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── API Proxy ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;

        # Headers forwarded to NestJS
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";   # Enable keepalive to upstream

        # Timeouts
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     60s;

        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
    }

    # ─── Stricter Rate Limit for Auth Endpoints ───────────────────────────────
    location /api/v1/auth/login {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /api/v1/auth/register-tenant {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ─── React SPA Static Files ───────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback for client-side routing

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ─── Health Check Endpoint (for load balancers) ───────────────────────────
    location /health {
        access_log  off;
        return 200 "OK\n";
        add_header  Content-Type text/plain;
    }

    # ─── Deny Hidden Files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
