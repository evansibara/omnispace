# =============================================================================
# OmniSpace — Development Docker Compose
#
# Starts: PostgreSQL + Redis (infrastructure services only).
# Backend and Frontend run on the host machine for hot-reload DX.
#
# Usage:
#   docker compose up -d        → start infrastructure
#   make dev                    → also starts backend + frontend (host)
#
# Note: Bind-mounting the entire source code into Docker for Node.js dev
# tends to be very slow on macOS. Running backend/frontend on the host
# (with `npm run start:dev` / `npm run dev`) provides the best DX.
# =============================================================================

services:

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnispace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-omnispace}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-omnispace}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omnispace_network

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnispace_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-omnispace_redis_dev}
      --appendonly yes
      --appendfsync everysec
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-omnispace_redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - omnispace_network

# ─── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  omnispace_network:
    driver: bridge
